syntax = "proto3";
package types;
option go_package = "github.com/canopy-network/go-plugin/contract";

import "google/protobuf/any.proto";
// Transaction represents a request or action submitted to the network like transfer assets or perform other operations
// within the blockchain system - THIS MUST MATCH lib.Transaction EXACTLY for signing
message Transaction {
  // message_type: The type of the transaction like 'send' or 'stake'
  string message_type = 1; // @gotags: json:"messageType"
  // msg: The actual transaction message payload, which is encapsulated in a generic message format
  google.protobuf.Any msg = 2;
  // signature: The cryptographic signature used to verify the authenticity of the transaction
  Signature signature = 3;
  // created_height: The height when the transaction was created - allows 'safe pruning'
  uint64 created_height = 4; // @gotags: json:"createdHeight"
  // time: The timestamp when the transaction was created - used as temporal entropy to prevent hash collisions in txs
  uint64 time = 5;
  // fee: The fee associated with processing the transaction
  uint64 fee = 6;
  // memo: An optional message or note attached to the transaction
  string memo = 7;
  // network_id: The identity of the network the transaction is intended for
  uint64 network_id = 8; // @gotags: json:"networkID"
  // chain_id: The identity of the committee the transaction is intended for
  uint64 chain_id = 9; // @gotags: json:"chainID"
  // NOTE: CAN EXTEND FUNCTIONALITY BY ADDING ADDITIONAL FIELDS
  // NO CONFLICT STARTING AT FIELD = 10
}

// MessageSend is a standard transfer transaction, taking tokens from the sender and transferring
// them to the recipient
message MessageSend {
  // from_address: is the sender of the funds
  bytes from_address = 1; // @gotags: json:"fromAddress"
  // to_address: is the recipient of the funds
  bytes to_address = 2; // @gotags: json:"toAddress"
  // amount: is the amount of tokens in micro-denomination (uCNPY)
  uint64 amount = 3;
}

// FeeParams is the parameter space that defines various amounts for transaction fees
message FeeParams {
  // send_fee: is the fee amount (in uCNPY) for Message Send
  uint64 send_fee = 1; // @gotags: json:"sendFee"
  // NO CONFLICT STARTING AT FIELD = 14
}

// A Signature is a digital signature is a cryptographic "fingerprint" created with a private key,
// allowing others to verify the authenticity and integrity of a message using the corresponding public key
message Signature {
  // public_key: is a cryptographic code shared openly, used to verify digital signatures
  bytes public_key = 1; // @gotags: json:"publicKey"
  // signature: the bytes of the signature output from a private key which may be verified with the message and public
  bytes signature = 2;
}

// NOTE: To add new transaction types (like MessageReward, MessageFaucet), see TUTORIAL.md

// ============================================================================
// LOOM — recursive trust social graph. 10 custom transaction types + the
// on-chain state records that back the live force-directed graph.
// All scores are stored as fixed-point uint64 (scale 1e6); average node ~= 1e6.
// ============================================================================

// --- 1. REGISTER_IDENTITY: create an on-chain profile/node ---
message MessageRegisterIdentity {
  bytes  author_address = 1; // @gotags: json:"authorAddress"
  string handle         = 2;
  string bio            = 3;
}

// --- 2. WEAVE_THREAD: vouch for an address, bonding a CNPY stake ---
message MessageWeaveThread {
  bytes  from_address = 1; // @gotags: json:"fromAddress"
  bytes  to_address   = 2; // @gotags: json:"toAddress"
  uint64 stake_amount = 3; // @gotags: json:"stakeAmount"
  string skill_tag    = 4; // @gotags: json:"skillTag"
}

// --- 3. BREAK_THREAD: revoke a vouch (penalty applied if flagged bad-faith) ---
message MessageBreakThread {
  bytes from_address = 1; // @gotags: json:"fromAddress"
  bytes to_address   = 2; // @gotags: json:"toAddress"
}

// --- 4. ENDORSE_SKILL: tag a skill; weight = endorser's recursive trust ---
message MessageEndorseSkill {
  bytes  from_address = 1; // @gotags: json:"fromAddress"
  bytes  to_address   = 2; // @gotags: json:"toAddress"
  string skill        = 3;
}

// --- 5. FORM_GUILD: create a community with a trust gate ---
message MessageFormGuild {
  bytes  creator_address = 1; // @gotags: json:"creatorAddress"
  string name            = 2;
  string description     = 3;
  uint64 min_trust       = 4; // @gotags: json:"minTrust"
}

// --- 6. JOIN_GUILD: join a guild (must clear min_trust gate) ---
message MessageJoinGuild {
  bytes  member_address = 1; // @gotags: json:"memberAddress"
  uint64 guild_id       = 2; // @gotags: json:"guildId"
}

// --- 7. POST_QUEST: a guild posts a contribution bounty ---
message MessagePostQuest {
  bytes  author_address = 1; // @gotags: json:"authorAddress"
  uint64 guild_id       = 2; // @gotags: json:"guildId"
  string title          = 3;
  string description     = 4;
  uint64 reward         = 5;
}

// --- 8. SUBMIT_PROOF: a member submits proof of a completed quest ---
message MessageSubmitProof {
  bytes  author_address = 1; // @gotags: json:"authorAddress"
  uint64 quest_id       = 2; // @gotags: json:"questId"
  string proof_uri      = 3; // @gotags: json:"proofUri"
}

// --- 9. ATTEST_CONTRIBUTION: reviewer verifies a proof; rep flows on approval ---
message MessageAttestContribution {
  bytes  reviewer_address = 1; // @gotags: json:"reviewerAddress"
  uint64 proof_id         = 2; // @gotags: json:"proofId"
  bool   approved         = 3;
}

// --- 10. CAST_WEIGHTED_VOTE: governance vote weighted by recursive trust ---
// First vote on a proposal_id lazily creates the proposal (title is used then).
message MessageCastWeightedVote {
  bytes  voter_address = 1; // @gotags: json:"voterAddress"
  string proposal_id   = 2; // @gotags: json:"proposalId"
  string title         = 3;
  bool   choice        = 4; // true = yes, false = no
}

// ============================ STATE RECORDS =================================

// Identity is a node in the trust graph. trust_score is recomputed every block
// by the recursive (PageRank-style) weighting in EndBlock.
message Identity {
  bytes  address           = 1;
  string handle            = 2;
  string bio               = 3;
  uint64 registered_height = 4; // @gotags: json:"registeredHeight"
  uint64 trust_score       = 5; // @gotags: json:"trustScore"
  uint64 in_degree         = 6; // @gotags: json:"inDegree"
  uint64 out_degree        = 7; // @gotags: json:"outDegree"
  uint64 staked_inbound    = 8; // @gotags: json:"stakedInbound"
}

// Thread is a directed, staked vouch edge (from -> to).
message Thread {
  bytes  from_address  = 1; // @gotags: json:"fromAddress"
  bytes  to_address    = 2; // @gotags: json:"toAddress"
  uint64 stake_amount  = 3; // @gotags: json:"stakeAmount"
  string skill_tag     = 4; // @gotags: json:"skillTag"
  uint64 woven_height  = 5; // @gotags: json:"wovenHeight"
  bool   active        = 6;
}

// Skill endorsement; weight snapshots the endorser's recursive trust at the time.
message Endorsement {
  bytes  from_address = 1; // @gotags: json:"fromAddress"
  bytes  to_address   = 2; // @gotags: json:"toAddress"
  string skill        = 3;
  uint64 weight       = 4;
  uint64 height       = 5;
}

message Guild {
  uint64 id             = 1;
  string name           = 2;
  string description     = 3;
  bytes  creator_address = 4; // @gotags: json:"creatorAddress"
  uint64 min_trust      = 5; // @gotags: json:"minTrust"
  uint64 member_count   = 6; // @gotags: json:"memberCount"
  uint64 created_height = 7; // @gotags: json:"createdHeight"
}

message GuildMember {
  uint64 guild_id       = 1; // @gotags: json:"guildId"
  bytes  member_address = 2; // @gotags: json:"memberAddress"
  uint64 joined_height  = 3; // @gotags: json:"joinedHeight"
}

message Quest {
  uint64 id             = 1;
  uint64 guild_id       = 2; // @gotags: json:"guildId"
  bytes  author_address = 3; // @gotags: json:"authorAddress"
  string title          = 4;
  string description     = 5;
  uint64 reward         = 6;
  string status         = 7; // open | submitted | attested
  uint64 created_height = 8; // @gotags: json:"createdHeight"
}

message Proof {
  uint64 id              = 1;
  uint64 quest_id        = 2; // @gotags: json:"questId"
  bytes  author_address  = 3; // @gotags: json:"authorAddress"
  string proof_uri       = 4; // @gotags: json:"proofUri"
  bool   attested        = 5;
  bool   approved        = 6;
  uint64 submitted_height = 7; // @gotags: json:"submittedHeight"
}

message Proposal {
  string id             = 1;
  string title          = 2;
  bytes  creator_address = 3; // @gotags: json:"creatorAddress"
  uint64 yes_weight     = 4; // @gotags: json:"yesWeight"
  uint64 no_weight      = 5; // @gotags: json:"noWeight"
  uint64 vote_count     = 6; // @gotags: json:"voteCount"
  uint64 created_height = 7; // @gotags: json:"createdHeight"
}

message Vote {
  string proposal_id  = 1; // @gotags: json:"proposalId"
  bytes  voter_address = 2; // @gotags: json:"voterAddress"
  bool   choice       = 3;
  uint64 weight       = 4;
  uint64 height       = 5;
}

// Counter is a single-record auto-incrementing id source, namespaced by key.
message Counter {
  uint64 count = 1;
}
